name: Deploy to EasyShift VDS

env:
  # Node.js 20 на GitHub Actions runners больше не поддерживается по умолчанию.
  # Опт-ин на Node.js 24 сейчас, чтобы не ловить неожиданные несовместимости.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (for reference)
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            cd /srv/easyshift/current

            # Git может ругаться на "dubious ownership" из-за отличий владельца каталога.
            # Делаем проверку safe.directory максимально надёжной:
            # 1) задаём writable место под глобальный gitconfig
            # 2) дополнительно прокидываем safe.directory через -c при fetch/reset
            export GIT_CONFIG_GLOBAL=/tmp/gitconfig
            git -c safe.directory=/srv/easyshift/current config --global --add safe.directory /srv/easyshift/current || true

            # Обновить код из GitHub (репозиторий должен быть уже настроен на сервере)
            git -c safe.directory=/srv/easyshift/current fetch origin main
            git -c safe.directory=/srv/easyshift/current reset --hard origin/main

            # Обновить зависимости при необходимости
            if [ -f package-lock.json ]; then
              npm install --omit=dev
            fi

            # Применить схему БД (опционально, если есть изменения)
            if [ -f apps/api/prisma/schema.prisma ]; then
              # Не валим весь deploy, если db push временно падает (например, из-за env/соединения).
              # UI-изменения (mini-app dist) должны доходить всегда.
              npx prisma db push --schema apps/api/prisma/schema.prisma || true
            fi

            # Перезапустить процессы API и бота под пользователем easyshift
            sudo -u easyshift -H pm2 restart easyshift-api --update-env || true
            sudo -u easyshift -H pm2 restart easyshift-bot --update-env || true

            # Перезагрузить Nginx, если конфиги менялись
            # Если nginx проверка упадёт, деплой всё равно считаем успешным,
            # чтобы UI (mini-app dist) и код успели доехать.
            nginx -t && sudo systemctl reload nginx || true

