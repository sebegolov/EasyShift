<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>EasyShift Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      // Явно указываем базовый URL API, чтобы frontend всегда ходил в /api/ через Nginx.
      // На сервере: https://5.42.117.107.sslip.io/api/ проксирует NestJS API.
      (function () {
        try {
          if (!window.__API_BASE__) {
            window.__API_BASE__ = `${window.location.origin}/api`;
          }
        } catch (e) {}
      })();

      // Защита от автопоказов "личного кабинета" при обычном открытии.
      // Если передали openAccount=1 — значит аккаунт запрошен явно (кнопка/команда).
      // Если openAccount!=1, то убираем потенциально “автозапускающие” параметры screen/settings/from.
      (function () {
        try {
          var url = new URL(window.location.href);
          var openAccount = url.searchParams.get('openAccount');
          if (openAccount !== '1') {
            var screen = url.searchParams.get('screen');
            var legacySettings = url.searchParams.get('settings');
            var from = url.searchParams.get('from');
            var looksLikeAccountRequest = screen === 'account' || legacySettings === 'account' || from === 'account';
            if (looksLikeAccountRequest) {
              url.searchParams.delete('screen');
              url.searchParams.delete('settings');
              url.searchParams.delete('from');
            }
            history.replaceState({}, '', url.toString());
          }
        } catch (e) {}
      })();
    </script>
