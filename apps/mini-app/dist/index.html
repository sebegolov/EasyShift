    <title>EasyShift Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      // Защита от автопоказов "личного кабинета" при обычном открытии.
      // Если передали screen=account (или legacy settings=account), но не передали from=account — убираем эти параметры до загрузки приложения.
      (function () {
        try {
          var url = new URL(window.location.href);
          var screen = url.searchParams.get('screen');
          var legacySettings = url.searchParams.get('settings');
          var from = url.searchParams.get('from');

          var isAccountRequest = screen === 'account' || legacySettings === 'account';
          if (isAccountRequest && from !== 'account') {
            url.searchParams.delete('screen');
            url.searchParams.delete('settings');
            url.searchParams.delete('from');
            history.replaceState({}, '', url.toString());
          }
        } catch (e) {}
      })();
    </script>
