<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>EasyShift Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      // Защита от автопоказов "личного кабинета" при обычном открытии.
      // Если передали settings=account, но не передали from=account, то убираем settings из URL до загрузки приложения.
      (function () {
        try {
          var url = new URL(window.location.href);
          var settings = url.searchParams.get('settings');
          var from = url.searchParams.get('from');
          if (settings === 'account' && from !== 'account') {
            url.searchParams.delete('settings');
            url.searchParams.delete('from');
            history.replaceState({}, '', url.toString());
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
